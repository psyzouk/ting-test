name: Publish to GitHub Pages

# Publishes the static site by force-pushing the deployable files from main
# to the gh-pages branch (the repo's Pages source). Avoids configure-pages,
# whose site-enablement API isn't accessible to the workflow token here.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-publish
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble site
        run: |
          mkdir -p /tmp/site
          cp -r index.html assets robots.txt _headers /tmp/site/
          touch /tmp/site/.nojekyll
      - name: Push to gh-pages
        run: |
          cd /tmp/site
          git init -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Publish site from ${GITHUB_SHA}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
